name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-regressions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kharkiv-map-backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: kharkiv-map-backend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate lexicon artifacts
        run: pnpm run generate:lexicon
      - name: Run hotspot/parser/correlation regressions
        run: pnpm run test:ci

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kharkiv-map-app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: kharkiv-map-app/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: pnpm run build
